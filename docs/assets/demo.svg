<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 936 342" role="img" aria-labelledby="demo-title demo-desc">
<title id="demo-title">EMDD Demo: Setup, AI Session Cycle, and Knowledge Graph</title>
<desc id="demo-desc">Three-panel storyboard: (1) Initialize an EMDD project and connect an AI assistant via MCP, (2) Follow the 4-step session cycle — context-loading, episode-creation, consolidation, health-review, (3) Build an evolving knowledge graph with typed nodes and edges.</desc>
<defs>
  <marker id="arrowDown" markerWidth="8" markerHeight="6" refX="4" refY="3" orient="auto">
    <path d="M0,0 L4,3 L0,6" fill="none" stroke="#565f89" stroke-width="1"/>
  </marker>
  <marker id="arrowLeft" markerWidth="8" markerHeight="6" refX="1" refY="3" orient="auto">
    <path d="M8,0 L2,3 L8,6" fill="none" stroke="#565f89" stroke-width="1"/>
  </marker>
</defs>
<style>
  .mono { font-family: 'SF Mono','Menlo','Consolas','Monaco',monospace; }
  .sans { font-family: -apple-system,'Segoe UI','Helvetica Neue',Arial,sans-serif; }
</style>
<rect x="0" y="0" width="936" height="342" rx="12" fill="#1a1b26"/>
<g><rect x="16" y="16" width="260" height="310" rx="8" fill="#24273a" stroke="#3b3f5c" stroke-width="1"/>
<circle cx="34" cy="36" r="10" fill="#7aa2f7"/>
<text x="34" y="40" fill="#1a1b26" font-size="11" class="sans" font-weight="bold" text-anchor="middle">1</text>
<text x="50" y="40" fill="#bb9af7" font-size="12" class="sans" font-weight="bold">Setup</text>
<rect x="24" y="54" width="244" height="118" rx="6" fill="#1a1b26"/>
<circle cx="38" cy="66" r="4" fill="#ff5f58"/>
<circle cx="50" cy="66" r="4" fill="#ffbd2e"/>
<circle cx="62" cy="66" r="4" fill="#18c132"/>
<text x="34" y="84" fill="#9ece6a" font-size="10" class="mono">$</text>
<text x="46" y="84" fill="#7dcfff" font-size="10" class="mono">emdd init my-research \</text>
<text x="46" y="99" fill="#7dcfff" font-size="10" class="mono">  --tool claude</text>
<text x="34" y="120" fill="#9ece6a" font-size="9.5" class="mono">✔ EMDD project initialized</text>
<text x="34" y="135" fill="#9ece6a" font-size="9.5" class="mono">✔ Rules generated for claude</text>
<line x1="36" y1="184" x2="256" y2="184" stroke="#3b3f5c" stroke-width="0.5" stroke-dasharray="4,3"/>
<text x="30" y="204" fill="#c0caf5" font-size="11" class="mono" font-weight="bold">What's next?</text>
<text x="32" y="223.5" fill="#ff9e64" font-size="9.5" class="mono">▸ Connect your AI via MCP</text>
<text x="40" y="238.5" fill="#7dcfff" font-size="9" class="mono">claude mcp add emdd \</text>
<text x="40" y="252" fill="#7dcfff" font-size="9" class="mono">  -- npx @beomjk/emdd mcp</text>
<text x="32" y="274.5" fill="#ff9e64" font-size="9.5" class="mono">▸ Then ask your AI:</text>
<text x="40" y="289.5" fill="#a9b1d6" font-size="9.5" class="mono">&quot;Load the EMDD context</text>
<text x="40" y="303" fill="#a9b1d6" font-size="9.5" class="mono"> and start the first session.&quot;</text></g>
<path d="M300,171 l9,0 l-4,-4 m4,4 l-4,4" stroke="#565f89" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
