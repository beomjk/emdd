name: Bug Report
description: Report a bug in the EMDD CLI, MCP server, or web dashboard
labels: ["bug"]
body:
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - CLI (`emdd` commands)
        - MCP Server (`emdd mcp`)
        - Web Dashboard (`emdd serve`)
        - Schema / Validation
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `emdd ...`
        2. ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should have happened instead?
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      value: |
        - EMDD version: (run `emdd --version`)
        - Node.js version: (run `node -v`)
        - OS:
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      placeholder: Error output, screenshots, related graph files, etc.
