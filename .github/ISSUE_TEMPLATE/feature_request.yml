name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      placeholder: What problem does this solve? Why do you need it?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      placeholder: Describe the feature you'd like. CLI command examples, MCP tool signatures, or UI mockups are helpful.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      placeholder: What other approaches did you consider? How do you work around this today?

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      description: Does this change the EMDD methodology or just the tooling?
      options:
        - Tool only (CLI/MCP/Web)
        - Spec change (new node type, edge type, ceremony, etc.)
    validations:
      required: true
