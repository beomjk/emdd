<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EMDD Dashboard</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div id="toolbar">
    <span class="toolbar-title">EMDD Dashboard</span>
    <div id="layout-selector"></div>
    <button id="refresh-btn" title="Refresh graph data">↻ Refresh</button>
    <button id="export-btn" title="Export as standalone HTML">⤓ Export</button>
    <button id="theme-btn" title="Toggle dark/light theme">☽</button>
    <div id="search-bar"></div>
  </div>
  <div id="app">
    <aside id="sidebar"></aside>
    <main id="graph-canvas">
      <div id="cy"></div>
      <div id="empty-state" class="hidden">
        <p>No nodes found. Create your first node with <code>emdd create</code></p>
      </div>
    </main>
    <section id="detail-panel"></section>
  </div>
  <div id="timeline"></div>
  <script src="/bundle.js"></script>
</body>
</html>
