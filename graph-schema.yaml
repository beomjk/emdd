# yaml-language-server: $schema=graph-schema.schema.json
# graph-schema.yaml — Single source of truth for EMDD graph structure
# All code constants, transition rules, and spec tables are derived from this file.
# Do NOT edit generated files directly; modify this file and run `npm run build`.

version: "1.0"

nodeTypes:
  - name: decision
    prefix: dec
    directory: decisions
    statuses: [PROPOSED, ACCEPTED, SUPERSEDED, REVERTED, CONTESTED]
    requiredFields: [id, type, title, status, created, updated]
    optionalFields: [tags, links, reversibility, alternatives_considered, rationale]

  - name: episode
    prefix: epi
    directory: episodes
    statuses: [ACTIVE, COMPLETED]
    requiredFields: [id, type, title, status, created, updated]
    optionalFields: [tags, links, trigger, duration, outcome, spawned, dead_ends]

  - name: experiment
    prefix: exp
    directory: experiments
    statuses: [PLANNED, RUNNING, COMPLETED, FAILED, ABANDONED]
    requiredFields: [id, type, title, status, created, updated]
    optionalFields: [tags, links, config, results, artifacts]

  - name: finding
    prefix: fnd
    directory: findings
    statuses: [DRAFT, VALIDATED, PROMOTED, RETRACTED]
    requiredFields: [id, type, title, status, confidence, created, updated]
    optionalFields: [tags, links, finding_type, sources]

  - name: hypothesis
    prefix: hyp
    directory: hypotheses
    statuses: [PROPOSED, TESTING, SUPPORTED, REFUTED, REVISED, DEFERRED, CONTESTED]
    requiredFields: [id, type, title, status, confidence, created, updated]
    optionalFields: [tags, links, kill_criterion, risk_level, priority, branch_group, branch_role]

  - name: knowledge
    prefix: knw
    directory: knowledge
    statuses: [ACTIVE, DISPUTED, SUPERSEDED, RETRACTED]
    requiredFields: [id, type, title, status, confidence, created, updated]
    optionalFields: [tags, links, knowledge_type, source]

  - name: question
    prefix: qst
    directory: questions
    statuses: [OPEN, RESOLVED, ANSWERED, DEFERRED]
    requiredFields: [id, type, title, status, created, updated]
    optionalFields: [tags, links, urgency, question_type, answer_summary, spawns_branch_group]

edgeTypes:
  forward:
    # evidence
    - supports
    - contradicts
    - confirms
    # generation
    - spawns
    - produces
    - answers
    - revises
    - promotes
    # structure
    - depends_on
    - extends
    - relates_to
    - informs
    # composition
    - part_of
    - context_for
    - resolves
    - tests
  reverse:
    # 16 forward 중 7개만 reverse label이 정의됨.
    # reverse label이 없는 9개는 단방향 관계이다.
    answered_by: answers
    confirmed_by: confirms
    produced_by: produces
    resolved_by: resolves
    spawned_from: spawns
    supported_by: supports
    tested_by: tests

edgeCategories:
  evidence:
    - supports
    - contradicts
    - confirms
  generation:
    - spawns
    - produces
    - answers
    - revises
    - promotes
  structure:
    - depends_on
    - extends
    - relates_to
    - informs
  composition:
    - part_of
    - context_for
    - resolves
    - tests
  value_producing:
    - supports
    - contradicts
    - confirms
    - spawns
    - produces
    - answers
    - revises
    - promotes
    - extends
    - informs
    - resolves
    - tests

statusCategories:
  positive:
    - SUPPORTED
    - VALIDATED
    - ACCEPTED
    - ACTIVE
    - ANSWERED
    - COMPLETED
    - PROMOTED
  negative:
    - REFUTED
    - RETRACTED
    - REVERTED
    - FAILED
    - ABANDONED
  in_progress:
    - TESTING
    - RUNNING
    - CONTESTED
    - DISPUTED
  terminal:
    - DEFERRED
    - SUPERSEDED
    - REVISED
    - RESOLVED
  initial:
    - PROPOSED
    - DRAFT
    - OPEN
    - PLANNED

thresholds:
  min_independent_supports: 2
  promotion_confidence: 0.9
  support_strength_min: 0.7
  kill_confidence: 0.3
  kill_stale_days: 14
  branch_max_active: 3
  branch_max_candidates: 4
  branch_max_open_weeks: 4
  branch_convergence_gap: 0.3
  branch_convergence_weeks: 2

transitions:
  # ─── hypothesis 전이 규칙 (9개) ───
  # 평가 우선순위: YAML 선언 순서 = 우선순위
  hypothesis:
    - from: PROPOSED
      to: TESTING
      conditions:
        - fn: has_linked
          args: { type: experiment, status: RUNNING, direction: any }

    - from: PROPOSED
      to: SUPPORTED
      conditions:
        - fn: has_linked
          args: { relation: supports, min_strength: 0.7, direction: incoming }

    - from: TESTING
      to: CONTESTED
      conditions:
        - fn: has_linked
          args: { type: decision, status: CONTESTED, direction: incoming }

    - from: TESTING
      to: REVISED
      conditions:
        - fn: has_linked
          args: { relation: revises, direction: incoming }

    - from: TESTING
      to: SUPPORTED
      conditions:
        - fn: has_linked
          args: { relation: supports, min_strength: 0.7, direction: incoming }

    - from: TESTING
      to: REFUTED
      conditions:
        - fn: has_linked
          args: { relation: contradicts, direction: incoming }

    - from: CONTESTED
      to: REVISED
      conditions:
        - fn: has_linked
          args: { relation: revises, direction: incoming }

    - from: CONTESTED
      to: SUPPORTED
      conditions:
        - fn: has_linked
          args: { relation: supports, min_strength: 0.7, direction: incoming }
        - fn: has_linked
          args: { type: decision, status: ACCEPTED, direction: incoming }

    - from: CONTESTED
      to: REFUTED
      conditions:
        - fn: has_linked
          args: { relation: contradicts, direction: incoming }
        - fn: has_linked
          args: { type: decision, status: ACCEPTED, direction: incoming }

  # ─── knowledge 전이 규칙 (4개) ───
  knowledge:
    - from: ACTIVE
      to: DISPUTED
      conditions:
        - fn: has_linked
          args: { relation: contradicts, direction: incoming }

    - from: ACTIVE
      to: SUPERSEDED
      conditions:
        - fn: has_linked
          args: { relation: revises, type: knowledge, direction: incoming }

    - from: DISPUTED
      to: SUPERSEDED
      conditions:
        - fn: has_linked
          args: { relation: revises, type: knowledge, direction: incoming }

    - from: DISPUTED
      to: ACTIVE
      conditions:
        - fn: all_linked_with
          args: { relation: contradicts, status: RETRACTED }

manualTransitions:
  hypothesis:
    - from: ANY
      to: DEFERRED
  knowledge:
    - from: DISPUTED
      to: RETRACTED

validValues:
  dependencyTypes: [LOGICAL, PRACTICAL, TEMPORAL]
  findingTypes: [observation, insight, negative]
  impacts: [DECISIVE, SIGNIFICANT, MINOR]
  reversibilities: [high, medium, low]
  riskLevels: [high, medium, low]
  severities: [FATAL, WEAKENING, TENSION]
  urgencies: [BLOCKING, HIGH, MEDIUM, LOW]

transitionPolicy:
  mode: strict

ceremonies:
  consolidation:
    triggers:
      unpromoted_findings_threshold: 5
      episodes_threshold: 3
      all_questions_resolved: true
      experiment_overload_threshold: 5

edgeAttributes:
  strength:
    type: number
    min: 0
    max: 1
  severity:
    type: enum
    valuesRef: severities
  completeness:
    type: number
    min: 0
    max: 1
  dependencyType:
    type: enum
    valuesRef: dependencyTypes
  impact:
    type: enum
    valuesRef: impacts

edgeAttributeAffinity:
  supports: [strength]
  contradicts: [severity]
  confirms: [strength]
  answers: [completeness]
  depends_on: [dependencyType]
  informs: [impact]
